    <script type="module">
        // ─── Jerome Zone Integration ───────────────────────────────
        // Connects to the GPT-SoVITS voice cloning space on HuggingFace

        const JEROME_SPACE = "khobster/the_jerome_zone";
        const DEFAULT_PROMPT_TEXT = "I was shocked to hear that the center from Houston";

        let jeromeClient = null;
        let connecting = false;

        async function loadGradioClient() {
            // Dynamic import from CDN
            const mod = await import("https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js");
            return mod.Client || mod.client || mod.default;
        }

        async function connectToJerome() {
            if (jeromeClient) return jeromeClient;
            if (connecting) {
                // Wait for existing connection attempt
                while (connecting) await new Promise(r => setTimeout(r, 200));
                return jeromeClient;
            }
            connecting = true;
            try {
                const ClientClass = await loadGradioClient();
                jeromeClient = await ClientClass.connect(JEROME_SPACE);
                console.log("✅ Connected to Jerome Zone");
                return jeromeClient;
            } catch (e) {
                console.warn("⚠️ Could not connect to Jerome Zone:", e);
                return null;
            } finally {
                connecting = false;
            }
        }

        // Pre-connect on page load (wakes the space if sleeping)
        connectToJerome().then(client => {
            if (client) {
                console.log("Jerome Zone pre-connected and ready");
            }
        });

        /**
         * Call Jerome Zone to generate audio from text.
         * Returns an audio blob URL, or null on failure.
         *
         * The generate_btn.click in app.py takes these inputs:
         *   [text_input, prompt_text_input, use_phonetic_hack,
         *    speed_slider, top_k_slider, top_p_slider, temperature_slider]
         *
         * fn_index 0 = healthcheck refresh button
         * fn_index 1 = generate button
         */
        window.generateJeromeAudio = async function(text) {
            try {
                const client = await connectToJerome();
                if (!client) throw new Error("No connection to Jerome Zone");

                console.log("🎤 Sending to Jerome:", text);

                // Try fn_index 1 (generate button) with all 7 inputs
                const result = await client.predict(1, [
                    text,                   // text_input
                    DEFAULT_PROMPT_TEXT,     // prompt_text_input
                    true,                   // use_phonetic_hack
                    0.96,                   // speed
                    1,                      // top_k (minimum is 1)
                    0.1,                    // top_p (minimum from slider)
                    0.1,                    // temperature
                ]);

                console.log("Jerome result:", result);

                // Gradio returns audio as { url: "...", ... } or as a file path
                const audioData = result.data[0];

                if (!audioData) throw new Error("No audio returned");

                // Handle different return formats
                if (typeof audioData === 'string') {
                    // Direct URL
                    return audioData;
                } else if (audioData.url) {
                    // Object with url property
                    return audioData.url;
                } else if (audioData.path) {
                    // Object with path — construct full URL
                    const base = `https://khobster-the-jerome-zone.hf.space/file=`;
                    return base + audioData.path;
                } else {
                    throw new Error("Unexpected audio format: " + JSON.stringify(audioData));
                }

            } catch (e) {
                console.error("Jerome generation failed:", e);

                // If fn_index 1 didn't work, try without fn_index (let client discover)
                try {
                    const client = await connectToJerome();
                    if (!client) throw e;

                    // Try calling by discovering available endpoints
                    const result = await client.predict("/synthesize_ui", [
                        text, DEFAULT_PROMPT_TEXT, true, 0.96, 1, 0.1, 0.1,
                    ]);

                    const audioData = result.data[0];
                    if (audioData && audioData.url) return audioData.url;
                    if (typeof audioData === 'string') return audioData;
                } catch (e2) {
                    console.error("Jerome fallback attempt also failed:", e2);
                }

                return null;
            }
        };

        window.jeromeModuleLoaded = true;
    </script>

        // ─── Status Helpers ────────────────────────────────────────
        function setStatus(msg, className) {
            const el = document.getElementById('jeromeStatus');
            el.textContent = msg;
            el.className = className || '';
        }

        function setStatusHTML(html, className) {
            const el = document.getElementById('jeromeStatus');
            el.innerHTML = html;
            el.className = className || '';
        }

        // ─── Browser Voice Fallback ────────────────────────────────
        function speakWithBrowserVoice(sentence) {
            const utterance = new SpeechSynthesisUtterance(sentence);
            utterance.voice = speechSynthesis.getVoices().find(
                voice => voice.lang.startsWith('en') && voice.name.includes('Male')
            );
            window.speechSynthesis.speak(utterance);
            setStatus('(browser voice — Jerome unavailable)', 'error');
        }

        // ─── Jerome Voice ──────────────────────────────────────────
        async function speakWithJerome(sentence) {
            setStatusHTML('<span class="spinner">📞</span> Jerome is cookin\' up your excuse... hang tight', '');

            const audioEl = document.getElementById('jeromeAudio');
            audioEl.classList.remove('visible');

            // Wait for the module to load (in case click happens before module is ready)
            let waited = 0;
            while (!window.jeromeModuleLoaded && waited < 3000) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }

            if (!window.generateJeromeAudio) {
                console.warn("Jerome module not loaded, falling back to browser voice");
                speakWithBrowserVoice(sentence);
                return;
            }

            try {
                const audioUrl = await window.generateJeromeAudio(sentence);
                if (!audioUrl) throw new Error("No audio URL returned");

                audioEl.src = audioUrl;
                audioEl.classList.add('visible');
                audioEl.play();

                setStatus('🎙️ Jerome has spoken.', 'success');
            } catch (e) {
                console.error("Jerome failed, falling back to browser voice:", e);
                speakWithBrowserVoice(sentence);
            }
        }

        // ─── Main Click Handler ────────────────────────────────────
        document.getElementById('bubLink').addEventListener('click', async function(event) {
            event.preventDefault();

            // Wake up speech synthesis (for fallback)
            var emptyUtterance = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(emptyUtterance);
            window.speechSynthesis.cancel();

            document.getElementById('sentenceFeedback').textContent = 'Generating excuse...';
            const sentence = await generateSentence();

            // Show the text immediately
            document.getElementById('generatedSentence').textContent = sentence;
            document.getElementById('excuseForm').style.display = 'block';
            document.getElementById('scriptText').style.display = 'block';
            document.getElementById('excuse').value = sentence;

            // Speak it
            if (useJeromeVoice) {
                await speakWithJerome(sentence);
            } else {
                speakWithBrowserVoice(sentence);
                setStatus('(browser voice)', '');
            }

            document.getElementById('sentenceFeedback').textContent = 'Press Bub for another excuse.';
        });
