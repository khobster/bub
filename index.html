    <!-- Gradio Client (loaded as module, exposes globals for Jerome + Kokoro) -->
    <script type="module">
        // ─── Shared Gradio Client Loader ──────────────────────────────
        let ClientClass = null;
        async function loadGradioClient() {
            if (ClientClass) return ClientClass;
            const mod = await import("https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js");
            ClientClass = mod.Client || mod.client || mod.default;
            return ClientClass;
        }

        // Helper: extract audio URL from Gradio result
        function extractAudioUrl(audioData, spaceBaseUrl) {
            if (!audioData) return null;
            if (typeof audioData === 'string') return audioData;
            if (audioData.url) return audioData.url;
            if (audioData.path) return spaceBaseUrl + '/file=' + audioData.path;
            return null;
        }

        // ─── Jerome Zone Integration ──────────────────────────────────
        const JEROME_SPACE = "khobster/the_jerome_zone";
        const DEFAULT_PROMPT_TEXT = "I was shocked to hear that the center from Houston";
        let jeromeClient = null;
        let jeromeConnecting = false;

        async function connectToJerome() {
            if (jeromeClient) return jeromeClient;
            if (jeromeConnecting) {
                while (jeromeConnecting) await new Promise(r => setTimeout(r, 200));
                return jeromeClient;
            }
            jeromeConnecting = true;
            try {
                const C = await loadGradioClient();
                jeromeClient = await C.connect(JEROME_SPACE);
                console.log("✅ Connected to Jerome Zone");
                return jeromeClient;
            } catch (e) {
                console.warn("⚠️ Could not connect to Jerome Zone:", e);
                return null;
            } finally {
                jeromeConnecting = false;
            }
        }

        // Pre-connect Jerome on page load
        connectToJerome().then(c => { if (c) console.log("Jerome pre-connected"); });

        window.generateJeromeAudio = async function(text) {
            try {
                const client = await connectToJerome();
                if (!client) throw new Error("No connection to Jerome Zone");
                console.log("🎤 Sending to Jerome:", text);

                const result = await client.predict(1, [
                    text, DEFAULT_PROMPT_TEXT, true, 0.96, 1, 0.1, 0.1,
                ]);
                console.log("Jerome result:", result);
                const url = extractAudioUrl(result.data[0], "https://khobster-the-jerome-zone.hf.space");
                if (!url) throw new Error("No audio URL from Jerome");
                return url;
            } catch (e) {
                console.error("Jerome primary call failed:", e);
                try {
                    const client = await connectToJerome();
                    if (!client) throw e;
                    const result = await client.predict("/synthesize_ui", [
                        text, DEFAULT_PROMPT_TEXT, true, 0.96, 1, 0.1, 0.1,
                    ]);
                    const url = extractAudioUrl(result.data[0], "https://khobster-the-jerome-zone.hf.space");
                    if (url) return url;
                } catch (e2) {
                    console.error("Jerome fallback also failed:", e2);
                }
                return null;
            }
        };

        // ─── Kokoro TTS Integration ───────────────────────────────────
        // Uses a duplicate of hexgrad/Kokoro-TTS (official space has API disabled)
        // predict_btn.click → fn predict(text, voice, speed) → audio
        // fn_index in duplicates:
        //   0=random_quote, 1=gatsby, 2=frankenstein,
        //   3=generate_first, 4=tokenize_first, 5=generate_all,
        //   6=stop, 7=predict
        const KOKORO_SPACES = [
            "khobster/Kokoro-TTS",
            "NeuralFalcon/Kokoro-TTS",
        ];
        const KOKORO_VOICE = "am_adam";  // fallback default
        const KOKORO_SPEED = 1.0;

        function getKokoroVoice() {
            return (window.getSelectedKokoroVoice && window.getSelectedKokoroVoice()) || KOKORO_VOICE;
        }

        let kokoroClient = null;
        let kokoroConnecting = false;
        let kokoroSpaceIndex = 0;

        async function connectToKokoro() {
            if (kokoroClient) return kokoroClient;
            if (kokoroConnecting) {
                while (kokoroConnecting) await new Promise(r => setTimeout(r, 200));
                return kokoroClient;
            }
            kokoroConnecting = true;
            try {
                const C = await loadGradioClient();
                // Try spaces in order until one connects
                for (let i = 0; i < KOKORO_SPACES.length; i++) {
                    try {
                        const space = KOKORO_SPACES[(kokoroSpaceIndex + i) % KOKORO_SPACES.length];
                        console.log("🔌 Trying Kokoro space:", space);
                        kokoroClient = await C.connect(space);
                        kokoroSpaceIndex = (kokoroSpaceIndex + i) % KOKORO_SPACES.length;
                        console.log("✅ Connected to Kokoro TTS:", space);
                        return kokoroClient;
                    } catch (e) {
                        console.warn("⚠️ Kokoro space failed:", KOKORO_SPACES[(kokoroSpaceIndex + i) % KOKORO_SPACES.length], e.message);
                    }
                }
                return null;
            } finally {
                kokoroConnecting = false;
            }
        }

        // Pre-connect Kokoro (lower priority than Jerome)
        setTimeout(() => {
            connectToKokoro().then(c => { if (c) console.log("Kokoro pre-connected"); });
        }, 2000);

        window.generateKokoroAudio = async function(text) {
            try {
                const client = await connectToKokoro();
                if (!client) throw new Error("No connection to Kokoro TTS");
                console.log("🗣️ Sending to Kokoro:", text);

                // Try predict endpoint (fn_index 7) — simplest, CPU-only, returns just audio
                let result;
                try {
                    result = await client.predict(7, [text, getKokoroVoice(), KOKORO_SPEED]);
                } catch (e1) {
                    console.warn("Kokoro fn_index 7 failed, trying /predict:", e1.message);
                    result = await client.predict("/predict", [text, getKokoroVoice(), KOKORO_SPEED]);
                }

                console.log("Kokoro result:", result);
                const audioData = result.data[0];
                const spaceName = KOKORO_SPACES[kokoroSpaceIndex].replace('/', '-');
                const baseUrl = `https://${spaceName}.hf.space`;
                const url = extractAudioUrl(audioData, baseUrl);
                if (!url) throw new Error("No audio URL from Kokoro");
                return url;
            } catch (e) {
                console.error("Kokoro generation failed:", e);

                // Try generate_first as fallback (fn_index 3)
                try {
                    const client = await connectToKokoro();
                    if (!client) throw e;
                    // generate_first(text, voice, speed, use_gpu)
                    const result = await client.predict(3, [text, getKokoroVoice(), KOKORO_SPEED, false]);
                    const audioData = result.data[0];
                    const spaceName = KOKORO_SPACES[kokoroSpaceIndex].replace('/', '-');
                    const baseUrl = `https://${spaceName}.hf.space`;
                    const url = extractAudioUrl(audioData, baseUrl);
                    if (url) return url;
                } catch (e2) {
                    console.error("Kokoro generate_first fallback also failed:", e2);
                }

                // Reset client so next attempt retries connection
                kokoroClient = null;
                return null;
            }
        };

        window.jeromeModuleLoaded = true;
    </script>

        let bestBrowserVoice = null;

        function findBestVoice() {
            const voices = speechSynthesis.getVoices();
            if (!voices.length) return null;

            // Priority tiers — first match wins
            const priorities = [
                // Microsoft Edge neural voices (Windows/Edge) — these are excellent
                v => /Microsoft.*Guy.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Andrew.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Christopher.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Eric.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Roger.*Online.*Natural/i.test(v.name),
                // Any Microsoft "Natural" English voice
                v => /Microsoft.*Natural/i.test(v.name) && v.lang.startsWith('en'),
                // Google neural voices (Chrome desktop)
                v => v.name === 'Google US English',
                v => v.name === 'Google UK English Male',
                // macOS / iOS quality voices
                v => /^Daniel/i.test(v.name) && v.lang.startsWith('en'),
                v => /^Aaron/i.test(v.name) && v.lang.startsWith('en'),
                v => /^Tom/i.test(v.name) && v.lang.startsWith('en'),
                // Any English voice with "premium" or "enhanced" in name
                v => /premium|enhanced|neural|natural/i.test(v.name) && v.lang.startsWith('en'),
                // Any English male voice as last resort
                v => v.lang.startsWith('en') && /male|guy|man|david|james|mark/i.test(v.name),
                // Any English voice at all
                v => v.lang.startsWith('en-US'),
                v => v.lang.startsWith('en'),
            ];

            for (const test of priorities) {
                const found = voices.find(test);
                if (found) return found;
            }
            return voices[0]; // absolute fallback
        }

        // Voices load async in some browsers
        function initVoices() {
            bestBrowserVoice = findBestVoice();
            if (bestBrowserVoice) {
                console.log('🗣️ Best browser voice:', bestBrowserVoice.name, bestBrowserVoice.lang);
            }

        speechSynthesis.onvoiceschanged = initVoices;
        initVoices(); // try immediately too

            const randomRestaurant = fetchRandomRestaurant();
            const randomMinutes = generateRandomMinutes();
            return `You'll have to excuse me I have a meeting with ${randomName} at ${randomRestaurant} in ${randomMinutes} minutes.`;
        }

        // ─── Status Helpers ────────────────────────────────────────
        function setStatus(msg, className) {
            const el = document.getElementById('jeromeStatus');
            el.textContent = msg;
            el.className = className || '';
        }

        function setStatusHTML(html, className) {
            const el = document.getElementById('jeromeStatus');
            el.innerHTML = html;
            el.className = className || '';
        }

        // ─── Narrator Voice (Kokoro TTS → browser fallback) ────────
        async function speakWithNarrator(sentence) {
            window.speechSynthesis.cancel();
            const audioEl = document.getElementById('jeromeAudio');

            setStatusHTML('<span class="spinner">📞</span> narrator is generating...', '');

            // Wait for module to be ready
            let waited = 0;
            while (!window.jeromeModuleLoaded && waited < 3000) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }

            // Try Kokoro first
            if (window.generateKokoroAudio) {
                try {
                    const audioUrl = await window.generateKokoroAudio(sentence);
                    if (audioUrl) {
                        audioEl.src = audioUrl;
                        audioEl.classList.add('visible');
                        audioEl.play();
                        // Show the funny name from the picker
                        const picker = document.getElementById('kokoroVoicePicker');
                        const funnyName = picker ? picker.options[picker.selectedIndex].text : 'narrator';
                        setStatus(`🗣️ ${funnyName}`, 'success');
                        return;
                    }
                } catch (e) {
                    console.warn("Kokoro failed, falling back to browser voice:", e);
                }
            }

            // Fallback to browser voice
            audioEl.classList.remove('visible');
            const utterance = new SpeechSynthesisUtterance(sentence);
            if (bestBrowserVoice) {
                utterance.voice = bestBrowserVoice;
            }
            utterance.rate = 0.95;
            utterance.pitch = 0.9;
            window.speechSynthesis.speak(utterance);
            const voiceName = bestBrowserVoice ? bestBrowserVoice.name : 'default';
            setStatus(`🗣️ narrator: ${voiceName} (browser fallback)`, '');
        }

        // ─── Jerome Voice ──────────────────────────────────────────
        async function speakWithJerome(sentence) {
            setStatusHTML('<span class="spinner">📞</span> Jerome is cookin\' up your excuse... hang tight', '');

            const audioEl = document.getElementById('jeromeAudio');
            audioEl.classList.remove('visible');

            // Wait for the module to load (in case click happens before module is ready)
            let waited = 0;
            while (!window.jeromeModuleLoaded && waited < 3000) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }

            if (!window.generateJeromeAudio) {
                console.warn("Jerome module not loaded, falling back to narrator");
                await speakWithNarrator(sentence);
                setStatus('(narrator — Jerome unavailable)', 'error');
                return;
            }

            try {
                const audioUrl = await window.generateJeromeAudio(sentence);
                if (!audioUrl) throw new Error("No audio URL returned");

                audioEl.src = audioUrl;
                audioEl.classList.add('visible');
                audioEl.play();

                setStatus('🎙️ Jerome has spoken.', 'success');
            } catch (e) {
                console.error("Jerome failed, falling back to narrator:", e);
                await speakWithNarrator(sentence);
                setStatus('(narrator — Jerome unavailable)', 'error');
            }
        }

        // ─── Main Click Handler ────────────────────────────────────
        document.getElementById('bubLink').addEventListener('click', async function(event) {
            event.preventDefault();

            // Wake up speech synthesis
            var emptyUtterance = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(emptyUtterance);
            window.speechSynthesis.cancel();

            document.getElementById('sentenceFeedback').textContent = 'Generating excuse...';
            document.getElementById('generatedSentence').textContent = '';
            document.getElementById('excuseForm').style.display = 'none';

            const sentence = await generateSentence();

            // Hide audio player by default
            const audioEl = document.getElementById('jeromeAudio');

            // For 'off' mode, show text immediately. For voice modes, wait for audio.
            if (voiceMode === 'off') {
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
                audioEl.classList.remove('visible');
                setStatus('', '');
            } else if (voiceMode === 'jerome') {
                await speakWithJerome(sentence);
                // Reveal text when audio is ready
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
            } else if (voiceMode === 'narrator') {
                audioEl.classList.remove('visible');
                await speakWithNarrator(sentence);
                // Reveal text when audio is ready
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
            }

            document.getElementById('sentenceFeedback').textContent = 'Press Bub for another excuse.';
        });

        // ─── Voice Toggle (3-way cycle) ────────────────────────────
        const voicePicker = document.getElementById('kokoroVoicePicker');

        document.getElementById('voiceToggle').addEventListener('click', function() {
            const currentIndex = VOICE_MODES.indexOf(voiceMode);
            voiceMode = VOICE_MODES[(currentIndex + 1) % VOICE_MODES.length];
            this.textContent = VOICE_LABELS[voiceMode];

            // Show voice picker only in narrator mode
            voicePicker.style.display = voiceMode === 'narrator' ? 'inline-block' : 'none';

            // Stop any playing audio when switching modes
            window.speechSynthesis.cancel();
            const audioEl = document.getElementById('jeromeAudio');
            audioEl.pause();
            audioEl.classList.remove('visible');
            setStatus('', '');
        });

        // Expose selected Kokoro voice for the module script to read
        window.getSelectedKokoroVoice = function() {
            return voicePicker.value;
        };

        // ─── Email Form ────────────────────────────────────────────
        document.getElementById('excuseForm').addEventListener('submit', function(event) {
            event.preventDefault();
            emailjs.sendForm('service_rys7roe', 'template_7iuqbut', this)
                .then(function() {
                    alert('Excuse sent!');
                }, function(error) {
                    alert('Failed to send excuse:', error);
                });
        });
    </script>
</body>
