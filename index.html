<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bub the escape artist</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NRB4K32M3X"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NRB4K32M3X');
    </script>
    <style>
        /* Jerome & Blob integration styles */
        #jeromeStatus {
            font-size: 0.85em;
            color: #a07030;
            margin-top: 8px;
            min-height: 1.2em;
            transition: opacity 0.3s;
        }
        #jeromeStatus.error { color: #c44; }
        #jeromeStatus.success { color: #4a4; }
        #jeromeStatus .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Audio player styling */
        #jeromeAudio {
            display: none;
            margin: 12px auto;
            max-width: 300px;
        }
        #jeromeAudio.visible {
            display: block;
        }

        /* Voice toggle */
        #voiceToggle {
            font-size: 0.75em;
            color: #888;
            cursor: pointer;
            margin-top: 4px;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        #voiceToggle:hover { color: #653600; }

        /* Kokoro voice picker */
        #kokoroVoicePicker {
            font-family: inherit;
            font-size: 0.8em;
            color: #653600;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 8px;
            margin: 4px auto 0;
            display: none;
            cursor: pointer;
            max-width: 260px;
        }
        #kokoroVoicePicker:hover { border-color: #653600; }
    </style>
</head>
<body>
    <header>
        <h1>☂️</h1>
    </header>
    <main>
        <h2>Bub the Escape Artist.</h2>
        <p id="sentenceFeedback">Press Bub & get an excuse to escape any convo.</p>

        <p id="voiceToggle" title="Click to cycle voice modes">🎙️ voice: Jerome</p>
        <select id="kokoroVoicePicker">
            <optgroup label="── American Guys ──">
                <option value="am_adam" selected>Slappy</option>
                <option value="am_michael">Don LaFountain</option>
                <option value="am_fenrir">Dick Paramount</option>
                <option value="am_puck">Bucky "Gui" Xerox</option>
                <option value="am_echo">Teddy "20 Pump" Palmer</option>
                <option value="am_eric">George Frisbee Whore</option>
                <option value="am_liam">Boogie "Above-Ground Pool" Williams</option>
                <option value="am_onyx">Wim Blenders</option>
                <option value="am_santa">Strip Mall Santa</option>
            </optgroup>
            <optgroup label="── American Ladies ──">
                <option value="af_heart">Barbara Blackberry</option>
                <option value="af_bella">Hot Yoga Instructor</option>
                <option value="af_nicole">Christy Cummings</option>
                <option value="af_aoede">NPR Host</option>
                <option value="af_kore">Patricia Pringle</option>
                <option value="af_sarah">Cookie</option>
                <option value="af_nova">Bunny Muffin</option>
                <option value="af_sky">Clementine Richard</option>
                <option value="af_alloy">Susan</option>
                <option value="af_jessica">Fifi Goop</option>
                <option value="af_river">Heidi Ping Pong</option>
            </optgroup>
            <optgroup label="── British Blokes ──">
                <option value="bm_george">James Bond's Butler</option>
                <option value="bm_fable">Bedtime Story Uncle</option>
                <option value="bm_lewis">Oxford Professor</option>
                <option value="bm_daniel">BBC Weather Man</option>
            </optgroup>
            <optgroup label="── British Ladies ──">
                <option value="bf_emma">BBC Correspondent</option>
                <option value="bf_isabella">Downton Abbey Extra</option>
                <option value="bf_alice">London Tour Guide</option>
                <option value="bf_lily">Bake Off Judge</option>
            </optgroup>
        </select>

        <p id="generatedSentence"></p>
        <audio id="jeromeAudio" controls></audio>
        <p id="jeromeStatus"></p>

        <form id="excuseForm" style="display:none;">
            <input type="email" id="emailAddress" name="user_email" placeholder="Your email address" required>
            <input type="hidden" id="excuse" name="excuse_message">
            <input type="submit" value="Send me this excuse">
        </form>
        <p id="scriptText" style="display:none;"></p>

        <a id="bubLink" href="#" style="cursor: pointer;">
            <img src="newbub.png" alt="Bub the Prophet">
        </a>
    </main>

    <script src="https://cdn.emailjs.com/sdk/2.3.2/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("jZCrMG8JEvzJ1JB1l");
        })();
    </script>

    <script type="module">
        // ─── Shared Gradio Client Loader ──────────────────────────────
        let ClientClass = null;
        async function loadGradioClient() {
            if (ClientClass) return ClientClass;
            const mod = await import("https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js");
            ClientClass = mod.Client || mod.client || mod.default;
            return ClientClass;
        }

        function extractAudioUrl(audioData, spaceBaseUrl) {
            if (!audioData) return null;
            if (typeof audioData === 'string') return audioData;
            if (audioData.url) return audioData.url;
            if (audioData.path) return spaceBaseUrl + '/file=' + audioData.path;
            return null;
        }

        // ─── Jerome Zone Integration ──────────────────────────────────
        const JEROME_SPACE = "khobster/the_jerome_zone";
        const DEFAULT_PROMPT_TEXT = "I was shocked to hear that the center from Houston";
        let jeromeClient = null;
        let jeromeConnecting = false;

        async function connectToJerome() {
            if (jeromeClient) return jeromeClient;
            if (jeromeConnecting) {
                while (jeromeConnecting) await new Promise(r => setTimeout(r, 200));
                return jeromeClient;
            }
            jeromeConnecting = true;
            try {
                const C = await loadGradioClient();
                jeromeClient = await C.connect(JEROME_SPACE);
                console.log("✅ Connected to Jerome Zone");
                return jeromeClient;
            } catch (e) {
                console.warn("⚠️ Could not connect to Jerome Zone:", e);
                return null;
            } finally {
                jeromeConnecting = false;
            }
        }

        connectToJerome().then(c => { if (c) console.log("Jerome pre-connected"); });

        window.generateJeromeAudio = async function(text) {
            try {
                const client = await connectToJerome();
                if (!client) throw new Error("No connection to Jerome Zone");
                
                const result = await client.predict(1, [
                    text, DEFAULT_PROMPT_TEXT, true, 0.96, 1, 0.1, 0.1,
                ]);
                const url = extractAudioUrl(result.data[0], "https://khobster-the-jerome-zone.hf.space");
                if (url) return url;
            } catch (e) {
                try {
                    const client = await connectToJerome();
                    const result = await client.predict("/synthesize_ui", [
                        text, DEFAULT_PROMPT_TEXT, true, 0.96, 1, 0.1, 0.1,
                    ]);
                    const url = extractAudioUrl(result.data[0], "https://khobster-the-jerome-zone.hf.space");
                    if (url) return url;
                } catch (e2) {}
                return null;
            }
        };

        // ─── Blob Murphy Integration ──────────────────────────────────
        const BLOB_SPACE = "khobster/BLOB_MURPHY"; 
        const BLOB_PROMPT_TEXT = "I remember the late Bart Giamatti said to me, Bob, would you enjoy being considered?";
        let blobClient = null;
        let blobConnecting = false;

        async function connectToBlob() {
            if (blobClient) return blobClient;
            if (blobConnecting) {
                while (blobConnecting) await new Promise(r => setTimeout(r, 200));
                return blobClient;
            }
            blobConnecting = true;
            try {
                const C = await loadGradioClient();
                blobClient = await C.connect(BLOB_SPACE);
                console.log("✅ Connected to Blob Murphy");
                return blobClient;
            } catch (e) {
                console.warn("⚠️ Could not connect to Blob Murphy:", e);
                return null;
            } finally {
                blobConnecting = false;
            }
        }

        connectToBlob().then(c => { if (c) console.log("Blob pre-connected"); });

        window.generateBlobAudio = async function(text) {
            try {
                const client = await connectToBlob();
                if (!client) throw new Error("No connection to Blob Murphy");
                console.log("🎤 Sending to Blob:", text);

                // Settings: [text, prompt, speed (slowed to 0.85), top_k, top_p, temp]
                const result = await client.predict("/synthesize_ui", [
                    text, BLOB_PROMPT_TEXT, 0.85, 1, 0.1, 0.1
                ]);
                
                const spaceBaseUrl = `https://${BLOB_SPACE.replace('/', '-')}.hf.space`;
                const url = extractAudioUrl(result.data[0], spaceBaseUrl);
                if (url) return url;
            } catch (e) {
                console.error("Blob generation failed:", e);
                return null;
            }
        };

        // ─── Kokoro TTS Integration ───────────────────────────────────
        const KOKORO_SPACES = ["khobster/Kokoro-TTS", "NeuralFalcon/Kokoro-TTS"];
        const KOKORO_VOICE = "am_adam"; 
        const KOKORO_SPEED = 1.0;

        function getKokoroVoice() {
            return (window.getSelectedKokoroVoice && window.getSelectedKokoroVoice()) || KOKORO_VOICE;
        }

        let kokoroClient = null;
        let kokoroConnecting = false;
        let kokoroSpaceIndex = 0;

        async function connectToKokoro() {
            if (kokoroClient) return kokoroClient;
            if (kokoroConnecting) {
                while (kokoroConnecting) await new Promise(r => setTimeout(r, 200));
                return kokoroClient;
            }
            kokoroConnecting = true;
            try {
                const C = await loadGradioClient();
                for (let i = 0; i < KOKORO_SPACES.length; i++) {
                    try {
                        const space = KOKORO_SPACES[(kokoroSpaceIndex + i) % KOKORO_SPACES.length];
                        kokoroClient = await C.connect(space);
                        kokoroSpaceIndex = (kokoroSpaceIndex + i) % KOKORO_SPACES.length;
                        return kokoroClient;
                    } catch (e) {}
                }
                return null;
            } finally {
                kokoroConnecting = false;
            }
        }

        setTimeout(() => {
            connectToKokoro().then(c => { if (c) console.log("Kokoro pre-connected"); });
        }, 2000);

        window.generateKokoroAudio = async function(text) {
            try {
                const client = await connectToKokoro();
                if (!client) throw new Error("No connection to Kokoro");
                
                let result;
                try {
                    result = await client.predict(7, [text, getKokoroVoice(), KOKORO_SPEED]);
                } catch (e1) {
                    result = await client.predict("/predict", [text, getKokoroVoice(), KOKORO_SPEED]);
                }

                const spaceName = KOKORO_SPACES[kokoroSpaceIndex].replace('/', '-');
                const baseUrl = `https://${spaceName}.hf.space`;
                const url = extractAudioUrl(result.data[0], baseUrl);
                if (url) return url;
            } catch (e) {
                try {
                    const client = await connectToKokoro();
                    const result = await client.predict(3, [text, getKokoroVoice(), KOKORO_SPEED, false]);
                    const spaceName = KOKORO_SPACES[kokoroSpaceIndex].replace('/', '-');
                    const baseUrl = `https://${spaceName}.hf.space`;
                    const url = extractAudioUrl(result.data[0], baseUrl);
                    if (url) return url;
                } catch (e2) {}
                kokoroClient = null;
                return null;
            }
        };

        window.jeromeModuleLoaded = true;
    </script>

    <script>
        // ─── Voice Modes ───────────────────────────────────────────
        const VOICE_MODES = ['jerome', 'blobmurphy', 'narrator', 'off'];
        const VOICE_LABELS = {
            jerome:     '🎙️ voice: Jerome',
            blobmurphy: '🎙️ voice: Blob Murphy',
            narrator:   '🗣️ voice: narrator',
            off:        '🔇 voice: off'
        };
        let voiceMode = 'jerome';

        // ─── Smart Browser Voice Selection ─────────────────────────
        let bestBrowserVoice = null;
        function findBestVoice() {
            const voices = speechSynthesis.getVoices();
            if (!voices.length) return null;
            const priorities = [
                v => /Microsoft.*Guy.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Andrew.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Christopher.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Eric.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Roger.*Online.*Natural/i.test(v.name),
                v => /Microsoft.*Natural/i.test(v.name) && v.lang.startsWith('en'),
                v => v.name === 'Google US English',
                v => v.name === 'Google UK English Male',
                v => /^Daniel/i.test(v.name) && v.lang.startsWith('en'),
                v => /^Aaron/i.test(v.name) && v.lang.startsWith('en'),
                v => /^Tom/i.test(v.name) && v.lang.startsWith('en'),
                v => /premium|enhanced|neural|natural/i.test(v.name) && v.lang.startsWith('en'),
                v => v.lang.startsWith('en') && /male|guy|man|david|james|mark/i.test(v.name),
                v => v.lang.startsWith('en-US'),
                v => v.lang.startsWith('en'),
            ];
            for (const test of priorities) {
                const found = voices.find(test);
                if (found) return found;
            }
            return voices[0];
        }

        function initVoices() {
            bestBrowserVoice = findBestVoice();
        }
        speechSynthesis.onvoiceschanged = initVoices;
        initVoices(); 

        // ─── Helper Functions ──────────────────────────────────────
        async function fetchRandomName() {
            const response = await fetch('https://randomuser.me/api/?nat=us,gb,ca,au,nz');
            const data = await response.json();
            return `${data.results[0].name.first} ${data.results[0].name.last}`;
        }

        function fetchRandomRestaurant() {
            const restaurants = ["7 Leaves Cafe", "Benihana", "Gen Korean BBQ", "HuHot Mongolian Grill",
                "Kabuki Japanese Restaurant", "Kona Grill", "Nobu", "P.F. Chang's China Bistro",
                "Roy's", "Bar Louie", "Beef O'Brady's", "HopCat", "Miller's Ale House",
                "Twin Peaks", "Yard House", "Gold Star Chili", "Shane's Rib Shack", "Skyline Chili",
                "Argo Tea", "Biggby Coffee", "Caribou Coffee", "The Coffee Bean & Tea Leaf", "Starbucks",
                "Taco Bell", "McDonald's", "Wendy's", "Burger King", "In-N-Out Burger", "Shake Shack"];
            return restaurants[Math.floor(Math.random() * restaurants.length)];
        }

        function generateRandomMinutes() {
            return Math.floor(Math.random() * 45) + 15;
        }

        async function generateSentence() {
            const randomName = await fetchRandomName();
            const randomRestaurant = fetchRandomRestaurant();
            const randomMinutes = generateRandomMinutes();
            
            // Reverted to standard, comma-free sentence
            return `You'll have to excuse me I have a meeting with ${randomName} at ${randomRestaurant} in ${randomMinutes} minutes.`;
        }

        function setStatus(msg, className) {
            const el = document.getElementById('jeromeStatus');
            el.textContent = msg;
            el.className = className || '';
        }

        function setStatusHTML(html, className) {
            const el = document.getElementById('jeromeStatus');
            el.innerHTML = html;
            el.className = className || '';
        }

        // ─── Playback Functions ────────────────────────────────────
        async function speakWithNarrator(sentence) {
            window.speechSynthesis.cancel();
            const audioEl = document.getElementById('jeromeAudio');
            setStatusHTML('<span class="spinner">📞</span> narrator is generating...', '');

            let waited = 0;
            while (!window.jeromeModuleLoaded && waited < 3000) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }

            if (window.generateKokoroAudio) {
                try {
                    const audioUrl = await window.generateKokoroAudio(sentence);
                    if (audioUrl) {
                        audioEl.src = audioUrl;
                        audioEl.classList.add('visible');
                        audioEl.play();
                        const picker = document.getElementById('kokoroVoicePicker');
                        const funnyName = picker ? picker.options[picker.selectedIndex].text : 'narrator';
                        setStatus(`🗣️ ${funnyName}`, 'success');
                        return;
                    }
                } catch (e) {}
            }

            audioEl.classList.remove('visible');
            const utterance = new SpeechSynthesisUtterance(sentence);
            if (bestBrowserVoice) utterance.voice = bestBrowserVoice;
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
            setStatus(`🗣️ narrator (browser fallback)`, '');
        }

        async function speakWithJerome(sentence) {
            setStatusHTML('<span class="spinner">📞</span> Jerome is cookin\' up your excuse... hang tight', '');
            const audioEl = document.getElementById('jeromeAudio');
            audioEl.classList.remove('visible');

            let waited = 0;
            while (!window.jeromeModuleLoaded && waited < 3000) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }

            if (!window.generateJeromeAudio) {
                await speakWithNarrator(sentence);
                setStatus('(narrator — Jerome unavailable)', 'error');
                return;
            }

            try {
                const audioUrl = await window.generateJeromeAudio(sentence);
                if (!audioUrl) throw new Error("No audio URL returned");
                audioEl.src = audioUrl;
                audioEl.classList.add('visible');
                audioEl.play();
                setStatus('🎙️ Jerome has spoken.', 'success');
            } catch (e) {
                await speakWithNarrator(sentence);
                setStatus('(narrator — Jerome unavailable)', 'error');
            }
        }

        async function speakWithBlob(sentence) {
            setStatusHTML('<span class="spinner">📞</span> Blob Murphy is in the booth... hang tight', '');
            const audioEl = document.getElementById('jeromeAudio');
            audioEl.classList.remove('visible');

            let waited = 0;
            while (!window.jeromeModuleLoaded && waited < 3000) {
                await new Promise(r => setTimeout(r, 100));
                waited += 100;
            }

            if (!window.generateBlobAudio) {
                await speakWithNarrator(sentence);
                setStatus('(narrator — Blob unavailable)', 'error');
                return;
            }

            try {
                const audioUrl = await window.generateBlobAudio(sentence);
                if (!audioUrl) throw new Error("No audio URL returned");
                audioEl.src = audioUrl;
                audioEl.classList.add('visible');
                audioEl.play();
                setStatus('🎙️ Blob Murphy has spoken.', 'success');
            } catch (e) {
                await speakWithNarrator(sentence);
                setStatus('(narrator — Blob unavailable)', 'error');
            }
        }

        // ─── Main Click Handler ────────────────────────────────────
        document.getElementById('bubLink').addEventListener('click', async function(event) {
            event.preventDefault();

            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            window.speechSynthesis.cancel();

            document.getElementById('sentenceFeedback').textContent = 'Generating excuse...';
            document.getElementById('generatedSentence').textContent = '';
            document.getElementById('excuseForm').style.display = 'none';

            const sentence = await generateSentence();
            
            const audioEl = document.getElementById('jeromeAudio');

            if (voiceMode === 'off') {
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
                audioEl.classList.remove('visible');
                setStatus('', '');
            } else if (voiceMode === 'jerome') {
                await speakWithJerome(sentence);
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
            } else if (voiceMode === 'blobmurphy') {
                await speakWithBlob(sentence);
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
            } else if (voiceMode === 'narrator') {
                audioEl.classList.remove('visible');
                await speakWithNarrator(sentence);
                document.getElementById('generatedSentence').textContent = sentence;
                document.getElementById('excuseForm').style.display = 'block';
                document.getElementById('scriptText').style.display = 'block';
                document.getElementById('excuse').value = sentence;
            }

            document.getElementById('sentenceFeedback').textContent = 'Press Bub for another excuse.';
        });

        // ─── Voice Toggle ──────────────────────────────────────────
        const voicePicker = document.getElementById('kokoroVoicePicker');

        document.getElementById('voiceToggle').addEventListener('click', function() {
            const currentIndex = VOICE_MODES.indexOf(voiceMode);
            voiceMode = VOICE_MODES[(currentIndex + 1) % VOICE_MODES.length];
            this.textContent = VOICE_LABELS[voiceMode];

            voicePicker.style.display = voiceMode === 'narrator' ? 'block' : 'none';

            window.speechSynthesis.cancel();
            const audioEl = document.getElementById('jeromeAudio');
            audioEl.pause();
            audioEl.classList.remove('visible');
            setStatus('', '');
        });

        window.getSelectedKokoroVoice = function() {
            return voicePicker.value;
        };

        // ─── Email Form ────────────────────────────────────────────
        document.getElementById('excuseForm').addEventListener('submit', function(event) {
            event.preventDefault();
            emailjs.sendForm('service_rys7roe', 'template_7iuqbut', this)
                .then(function() {
                    alert('Excuse sent!');
                }, function(error) {
                    alert('Failed to send excuse:', error);
                });
        });
    </script>
</body>
</html>
